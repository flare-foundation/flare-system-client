# This is an example configuration file for the flare-system-client.
# It contains all the possible configuration options with comments.
# For a minimal configuration, you can remove the options that you don't need to change from their default values.

# Database configuration for the indexer.
[db]
host = "localhost"
port = 5432
user = "user"
password = "password"
dbname = "flare-system-client"

# Logger configuration.
[logger]
level = "INFO" # Log level: "DEBUG", "INFO", "WARN", "ERROR", "FATAL", "PANIC"
encoding = "console" # "console" or "json"
# file = "./logs/fsp.log"
console = true

# Chain configuration.
[chain]
eth_rpc_url = "http://localhost:9650/ext/C/rpc" # Ethereum RPC URL of the C-chain.
chain_id = 114 # Chain ID of the network (14 for Flare, 114 for Coston2, 19 for Songbird, 16 for Coston).

# Metrics configuration for Prometheus.
[metrics]
prometheus_address = "localhost:9680" # Address to expose Prometheus metrics.

# Configuration for enabling/disabling different clients.
[clients]
enabled_registration = true     # Enable voter registration.
enabled_pre_registration = true # Enable voter pre-registration.
enabled_uptime_voting = true    # Enable uptime voting.
enabled_reward_signing = true   # Enable reward signing.
enabled_protocol_voting = true  # Enable protocol voting (submit1, submit2, submitSignatures)
enabled_finalizer = true        # Enable finalizer.

# Contract addresses on the C-chain.
[contract_addresses]
submission = "0x..."
systems_manager = "0x..."
voter_registry = "0x..."
voter_preregistry = "0x..."
relay = "0x..."

# Identity configuration.
[identity]
address = "0x..." # The address of the data provider's identity.

# Credentials configuration.
# Private keys can be provided directly or via a file path.
# It is recommended to use environment variables for private keys for security.
# e.g., export SIGNING_POLICY_PRIVATE_KEY="your_private_key"
[credentials]
# Private key for signing data (e.g., for submitSignatures).
signing_policy_private_key_file = "/path/to/signing_policy_private_key"
# signing_policy_private_key = "..." # envconfig:"SIGNING_POLICY_PRIVATE_KEY"

# Private key for sending transactions like RegisterVoter and SignNewSigningPolicy.
system_client_sender_private_key_file = "/path/to/system_client_sender_private_key"
# system_client_sender_private_key = "..." # envconfig:"SYSTEM_CLIENT_SENDER_PRIVATE_KEY"

# Private key for submitting protocol data (submit1, submit2).
protocol_manager_submit_private_key_file = "/path/to/protocol_manager_submit_private_key"
# protocol_manager_submit_private_key = "..." # envconfig:"PROTOCOL_MANAGER_SUBMIT_PRIVATE_KEY"

# Private key for submitting protocol signatures.
protocol_manager_submit_signatures_private_key_file = "/path/to/protocol_manager_submit_signatures_private_key"
# protocol_manager_submit_signatures_private_key = "..." # envconfig:"PROTOCOL_MANAGER_SUBMIT_SIGNATURES_PRIVATE_KEY"

# Protocol configurations. You can define multiple protocols.
[protocol.ftso]
id = 0
api_endpoint = "http://localhost:3100" # url where subptotocol clients exposes endpoints
type = 1 # Type of submitSignature payload
# To specify an API key for this endpoint set it via PROTOCOL_X_API_KEY_${id} (PROTOCOL_X_API_KEY_0) env var


[protocol.fdc]
id = 200
api_endpoint = "http://localhost:8080/fsp"
type = 1 # Type of submitSignature payload
# To specify an API key for this endpoint set it via PROTOCOL_X_API_KEY_${id} (PROTOCOL_X_API_KEY_200) env var


# Configuration for the submit1 operation.
[submit1]
enabled = true
start_offset = "75s" # Offset from the start of the epoch.
tx_submit_retries = 2
tx_submit_timeout = "5s"
data_fetch_retries = 1
data_fetch_timeout = "5s"

# Configuration for the submit2 operation.
[submit2]
enabled = true
start_offset = "20s" # Offset from the start of the epoch.
tx_submit_retries = 2
tx_submit_timeout = "5s"
data_fetch_retries = 1
data_fetch_timeout = "5s"

# Configuration for the submitSignatures operation.
[submit_signatures]
enabled = true
start_offset = "45s" # Offset from the start of the epoch.
tx_submit_retries = 5
tx_submit_timeout = "5s"
data_fetch_retries = 1
data_fetch_timeout = "2s"
deadline = "58s" # Deadline from the start of the epoch for sending submitSignatures tx.
max_cycles = 5 # Maximal number of query cycles after the deadline.
cycle_duration = "2" # Minimal duration of a cycle after the deadline.

# Finalizer configuration.
[finalizer]
starting_reward_epoch = 0 # The reward epoch from which to start processing.
starting_voting_round = 0 # The voting round from which to start processing. 0 means current.
start_offset = "168h" # 7 days. How far in the past to start fetching reward epochs from the indexer.
voter_threshold_bips = 500 # Voter threshold in basis points for selecting voters.
grace_period_end_offset = "65s" # Offset from the start of the voting round to define the end of the grace period.

# Gas configuration for submitting protocol data.
[gas_submit]
tx_type = 2 # 0 for legacy, 2 for EIP-1559 (recommended).
gas_limit = 0 # 0 for auto-estimation. Set only if you know what you are doing.
# Type 0 tx gas settings
# gas_price_multiplier = 1.0
# gas_price_fixed = "100000000000" # Use a fixed gas price. Overrides multiplier.
# Type 2 tx gas settings
max_priority_fee_multiplier = "2"
minimal_max_priority_fee = "100000000000" # 100 Gwei
maximal_max_priority_fee = "5000000000000" # 5000 Gwei
base_fee_multiplier = "4"
# base_fee_per_gas_cap = "..." # LEAVE UNSET UNLESS YOU KNOW WHAT YOU ARE DOING.

# Gas configuration for voter registration.
[gas_register]
tx_type = 2
gas_limit = 0
max_priority_fee_multiplier = "2"
minimal_max_priority_fee = "100000000000"
maximal_max_priority_fee = "5000000000000"
base_fee_multiplier = "4"

# Gas configuration for relaying finalization transactions.
[gas_relay]
tx_type = 2
gas_limit = 0
max_priority_fee_multiplier = "2"
minimal_max_priority_fee = "100000000000"
maximal_max_priority_fee = "5000000000000"
base_fee_multiplier = "4"

# Gas configuration for SystemsManager contract interactions.
[gas_systems_manager]
tx_type = 2
gas_limit = 0
max_priority_fee_multiplier = "2"
minimal_max_priority_fee = "100000000000"
maximal_max_priority_fee = "5000000000000"
base_fee_multiplier = "4"

# Rewards signing configuration.
# [rewards]
# url_prefix = "https://reward-data.flare.network/" # URL prefix for fetching reward distribution data.
# min_reward = "0" # Minimum reward amount in wei to sign for.
# max_reward = "0" # Maximum reward amount in wei to sign for. 0 means no limit.
# retries = 8
# retry_interval = "6h"