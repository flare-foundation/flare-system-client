version: "2"
run:
  go: "1.26.4"
  modules-download-mode: readonly
linters:
  default: standard
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - containedctx
    - copyloopvar
    - decorder
    - errchkjson
    - errname
    - exhaustive
    - exptostd
    - forcetypeassert
    - misspell
    - nolintlint
    - unconvert
    - whitespace

    - modernize
    - thelper
    - usestdlibvars
    - usetesting
    - unparam
    - predeclared
    - prealloc

  settings:
    exhaustive:
      default-signifies-exhaustive: true
    nolintlint:
      require-specific: true
    govet:
      settings:
        printf:
          # teach the printf checker the custom logger: *f variants are
          # printf-like, the rest are print-like (flags stray format verbs)
          funcs:
            - github.com/flare-foundation/go-flare-common/pkg/logger.Debugf
            - github.com/flare-foundation/go-flare-common/pkg/logger.Infof
            - github.com/flare-foundation/go-flare-common/pkg/logger.Warnf
            - github.com/flare-foundation/go-flare-common/pkg/logger.Errorf
            - github.com/flare-foundation/go-flare-common/pkg/logger.Fatalf
            - github.com/flare-foundation/go-flare-common/pkg/logger.Panicf
            - github.com/flare-foundation/go-flare-common/pkg/logger.Debug
            - github.com/flare-foundation/go-flare-common/pkg/logger.Info
            - github.com/flare-foundation/go-flare-common/pkg/logger.Warn
            - github.com/flare-foundation/go-flare-common/pkg/logger.Error
exclusions:
  generated: lax
  paths:
    - third_party$
    - builtin$
    - examples$
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$

issues:
  max-same-issues: 3
